aid: rasyonet
name: Rasyonet
description: >-
  Rasyonet is a Turkish fintech company providing integrated financial software
  solutions and capital markets data platforms for institutional clients, asset
  managers, and financial analysts. Founded in 2000 and headquartered at ITU ARI
  Teknopark in Istanbul, Rasyonet offers tools for analyzing global equity
  markets, economic indicators, mutual and pension funds, fixed-income
  securities, portfolio analytics, and automated financial reporting. Their
  flagship EquityRT platform delivers equity research, company valuation, and
  peer benchmarking capabilities via desktop and Excel integration. No public
  developer API or machine-readable specification has been documented at this
  time.
